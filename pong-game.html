<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            background-color: #000;
            display: block;
            margin: 0 auto;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-item {
            flex: 1;
            padding: 10px;
        }

        .controls {
            color: #fff;
            margin-top: 20px;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .controls p {
            margin: 5px 0;
        }

        .reset-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background-color: #00cc00;
            transform: scale(1.05);
        }

        .reset-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="scoreboard">
            <div class="score-item">
                <div>Player (Left)</div>
                <div id="playerScore">0</div>
            </div>
            <div class="score-item">
                <div>Computer (Right)</div>
                <div id="computerScore">0</div>
            </div>
        </div>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse: Move left paddle up/down</p>
            <p>⬆️ Arrow Keys: Move left paddle up/down</p>
            <p>Right paddle is controlled by AI</p>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        const paddleHeight = 100;
        const paddleWidth = 10;
        const ballSize = 8;
        const paddleSpeed = 6;
        const ballSpeed = 5;

        // Paddle positions
        let leftPaddle = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            height: paddleHeight,
            width: paddleWidth,
            dy: 0
        };

        let rightPaddle = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            height: paddleHeight,
            width: paddleWidth,
            dy: 0
        };

        // Ball
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: ballSpeed,
            dy: ballSpeed,
            radius: ballSize
        };

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Keyboard input
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse input
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            leftPaddle.y = Math.max(0, Math.min(mouseY - paddleHeight / 2, canvas.height - paddleHeight));
        });

        // Update game state
        function update() {
            // Handle keyboard input for left paddle
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                leftPaddle.y = Math.max(0, leftPaddle.y - paddleSpeed);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                leftPaddle.y = Math.min(canvas.height - paddleHeight, leftPaddle.y + paddleSpeed);
            }

            // AI for right paddle
            const rightPaddleCenter = rightPaddle.y + paddleHeight / 2;
            const ballCenter = ball.y;
            
            if (rightPaddleCenter < ballCenter - 35) {
                rightPaddle.y = Math.min(canvas.height - paddleHeight, rightPaddle.y + paddleSpeed * 0.8);
            } else if (rightPaddleCenter > ballCenter + 35) {
                rightPaddle.y = Math.max(0, rightPaddle.y - paddleSpeed * 0.8);
            }

            // Update ball position
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with left paddle
            if (
                ball.x - ball.radius < leftPaddle.x + leftPaddle.width &&
                ball.y > leftPaddle.y &&
                ball.y < leftPaddle.y + paddleHeight
            ) {
                ball.dx = Math.abs(ball.dx);
                ball.x = leftPaddle.x + leftPaddle.width + ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (leftPaddle.y + paddleHeight / 2)) / (paddleHeight / 2);
                ball.dy += hitPos * 2;
            }

            // Ball collision with right paddle
            if (
                ball.x + ball.radius > rightPaddle.x &&
                ball.y > rightPaddle.y &&
                ball.y < rightPaddle.y + paddleHeight
            ) {
                ball.dx = -Math.abs(ball.dx);
                ball.x = rightPaddle.x - ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (rightPaddle.y + paddleHeight / 2)) / (paddleHeight / 2);
                ball.dy += hitPos * 2;
            }

            // Ball out of bounds (scoring)
            if (ball.x - ball.radius < 0) {
                computerScore++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                playerScore++;
                resetBall();
            }

            // Update scoreboard
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Draw functions
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCenterLine() {
            ctx.strokeStyle = '#00ff00';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000');

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawRect(leftPaddle.x, leftPaddle.y, leftPaddle.width, paddleHeight, '#00ff00');
            drawRect(rightPaddle.x, rightPaddle.y, rightPaddle.width, paddleHeight, '#ff0000');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, '#ffff00');
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ballSpeed;
            ball.dy = (Math.random() - 0.5) * ballSpeed;
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            leftPaddle.y = canvas.height / 2 - paddleHeight / 2;
            rightPaddle.y = canvas.height / 2 - paddleHeight / 2;
            resetBall();
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
